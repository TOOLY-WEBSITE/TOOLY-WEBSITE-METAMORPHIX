<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Tooly</title>
    <link rel="stylesheet" href="css/contact.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">Tooly</div>
        <div class="nav-links">
            <a href="./index.html">Home</a>
            <a href="./contact.html" class="active">Contact</a>
            <a href="./login.html">Login</a>

        </div>
    </nav>
    <h2 style="text-align:center">Contact us</h2>
    <div class="contact-container">
        <form class="contact-form">
            <label>Your Name</label>
            <input type="text" placeholder="Enter Your Name" required>

            <label>Email</label>
            <input type="email" placeholder="Enter Your Email" required>

            <label>Message</label>
            <textarea placeholder="Write Your Message...." rows="5" required></textarea>
            <button type="submit" class="btn">Send Message</button>
        </form>
    </div>
    <div id="successToast" class="toast">Message sent successfully!</div>

         <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-inner">

            <div class="footer-col">
                <div class="footer-logo">Tooly</div>
                <p class="footer-text">
                    A premium collection of free online tools — made for students, creators & developers.
                </p>
            </div>

            <div class="footer-col">
                <h4>Quick Links</h4>
                <a href="./index.html">Home</a>
                <a href="./contact.html">Contact</a>
                <a href="./login.html">Login</a>
            </div>

            <div class="footer-col">
                <h4>Support</h4>
                <a href="#">Privacy Policy</a>
                <a href="#">Terms & Conditions</a>
                <a href="#">Help Center</a>
            </div>

        </div>

        <div class="footer-bottom">
            <p>© <span id="year"></span> Tooly. All rights reserved.</p>
        </div>
    </footer>
</body>

</html>
