<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Remover | Tooly</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="bg-remover.css">
</head>

<body>
    <div class="container">
        <div class="card">
            <h1>Background Remover</h1>
            <p class="subtitle">Upload an image and remove its background instantly</p>

            <label class="upload-box" id="drop-area" for="file-input">
    <span id="upload-text">📤 Click or Drag Image Here</span>
</label>

            <div class="loader" id="loader"></div>
            <input type="file" id="file-input" accept="image/*">
            <img id="preview" alt="Preview">
            <button id="remove-btn">Remove Background</button>
            <img id="result-img" alt="Result">
            <a id="download" download="removed-bg.png">⬇ Download Image</a>
        </div>
    </div>
</body>

</html>
