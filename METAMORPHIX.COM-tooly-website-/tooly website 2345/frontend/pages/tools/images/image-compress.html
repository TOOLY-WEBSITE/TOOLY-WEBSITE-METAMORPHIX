<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor</title>
    <link rel="stylesheet" href="image-compress.css">
</head>

<body>

    <div class="wrapper">
        <div class="card">

            <h1>Image Compressor</h1>
            <p class="subtitle">Upload images and reduce file size instantly</p>

            <label class="drop-area">
<input type="file" multiple accept="image/*">
<div class="drop-content">
<p>Drag & Drop Images</p>
<span>or click to browse</span>
</div>
</label>

            <div class="control">
                <label>Compression Quality</label>
                <input type="range" min="0.1" max="1" step="0.1" value="0.7">
            </div>

            <button class="compress-btn">Compress Images</button>

            <div class="result">
                <p>Compressed files will appear here</p>
            </div>

        </div>
    </div>

</body>

</html>
